<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script>
    const API = "{{ API }}"
    console.log(API)
  </script>
</head>
<body>
    <header id="taskHeader" class="em-c-header em-c-header--blue">
        <h1>Todo List</h1>
    </header>

    <div id="taskForm">
        <form class="em-c-toolbar">
            <input type="text" id="taskInput" placeholder="Add a new task" autocomplete="off" />
            <button type="submit" class="em-c-btn em-c-btn--primary">Add</button>
        </form>

        <div class="filters" style="margin-bottom: 2%;">
            <button data-filter="all" class="filter-btn active em-c-btn em-c-btn--primary">All</button>
            <button data-filter="active" class="filter-btn em-c-btn em-c-btn--primary">Active</button>
            <button data-filter="completed" class="filter-btn em-c-btn em-c-btn--primary">Completed</button>
            </div>

            <ul id="taskList"></ul>
        </div>
    </div>
  <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
